services:
  db:
    image: postgres:16
    container_name: appointment-booking-db
    environment:
      POSTGRES_DB: appointments
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appointments"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: appointment-booking-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/appointments
      RAG_PDF_DIR: ./data/rag/pdfs
      RAG_CRAWL_OUTPUT_PATH: ./data/rag/crawl_output.json
      RAG_FAISS_INDEX_DIR: ./faiss_index
      RAG_EMBEDDING_MODEL: BAAI/bge-base-en
    volumes:
      - ./backend/app:/app/app
      - ./backend/data:/app/data
      - ./backend/faiss_index:/app/faiss_index
    ports:
      - "8080:8000"

volumes:
  postgres_data:
